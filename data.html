<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Emissions / Bubble Chart</title>
    <link rel="stylesheet" href="data.css">
</head>
<body>

<div id="layout">

  <div id="left-panel">
    <div class="header">
      <h1>This is how your consumption compares to the rest of the world:</h1>
    </div>

    <div id="ctrls">
      <select id="metricSel">
        <option value="total">categories</option>
        <option value="flights">flights only</option>
        <option value="clothco2">clothing only</option>
        <option value="packages">e-commerce only</option>
        <option value="meatkg">meat consumption</option>
        <option value="avgt">avg total CO₂</option>
      </select>
      <button id="replayBtn">replay</button>
    </div>

    <div id="info-panel" class="empty">
      <div id="countryName"></div>
      <div id="countryMeta"></div>
      <div id="countryBreakdown"></div>
    </div>

    <div id="hint">hover a bubble to explore</div>
  </div>

  <div id="right-panel">
    <div id="sketch-container">
      <svg id="svg"></svg>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
  /* ── RAW DATA ─────────────────────────────────────────────────────────── */
  const RAW = [
    { name:'China',       flights:80,   meatkg:70.57,  avgt:866,  clothitems:28, clothco2:420, packages:22.1 },
    { name:'India',       flights:17,   meatkg:6.63,   avgt:220,  clothitems:9,  clothco2:135, packages:1.6  },
    { name:'Russia',      flights:130,  meatkg:81.71,  avgt:1229, clothitems:20, clothco2:300, packages:15.8 },
    { name:'Germany',     flights:420,  meatkg:71.32,  avgt:677,  clothitems:45, clothco2:675, packages:30.2 },
    { name:'UK',          flights:560,  meatkg:84.08,  avgt:453,  clothitems:48, clothco2:720, packages:51.0 },
    { name:'Canada',      flights:480,  meatkg:90.96,  avgt:1342, clothitems:42, clothco2:630, packages:31.2 },
    { name:'Australia',   flights:680,  meatkg:112.34, avgt:1448, clothitems:56, clothco2:840, packages:35.5 },
    { name:'Qatar',       flights:1800, meatkg:88.81,  avgt:4127, clothitems:32, clothco2:480, packages:26.2 },
    { name:'UAE',         flights:2300, meatkg:83.21,  avgt:2013, clothitems:35, clothco2:525, packages:20.2 },
    { name:'Brazil',      flights:90,   meatkg:98.79,  avgt:228,  clothitems:22, clothco2:330, packages:6.7  },
    { name:'Nigeria',     flights:8,    meatkg:7.61,   avgt:58,   clothitems:6,  clothco2:90,  packages:1.0  },
    { name:'Indonesia',   flights:45,   meatkg:19.16,  avgt:287,  clothitems:14, clothco2:210, packages:7.7  },
    { name:'USA',         flights:340,  meatkg:112.80, avgt:1420, clothitems:51, clothco2:765, packages:71.2 },
    { name:'Switzerland', flights:780,  meatkg:66.68,  avgt:359,  clothitems:50, clothco2:750, packages:26.1 },
    { name:'France',      flights:390,  meatkg:84.60,  avgt:397,  clothitems:43, clothco2:645, packages:24.7 },
    { name:'Ireland',     flights:980,  meatkg:90.67,  avgt:634,  clothitems:40, clothco2:600, packages:26.5 },
    { name:'Norway',      flights:820,  meatkg:72.24,  avgt:667,  clothitems:32, clothco2:480, packages:30.7 },
  ];

  /* ── INJECT USER DATA FROM localStorage ──────────────────────────────── */
  const saved = JSON.parse(localStorage.getItem('userEmissions') || 'null');
  if (saved) {
    RAW.push({
      name:       'You',
      flights:    saved.flights    || 0,
      meatkg:     saved.meatkg     || 0,
      avgt:       saved.avgt       || 0,
      clothitems: saved.clothitems || 0,
      clothco2:   saved.clothco2   || 0,
      packages:   saved.packages   || 0,
      isUser:     true,
    });
  }

  const BREAKDOWN_KEYS = [
    { key:'flights',    label:'flights (kg CO₂)' },
    { key:'meatkg',     label:'meat (kg)' },
    { key:'avgt',       label:'avg total CO₂' },
    { key:'clothitems', label:'clothing items' },
    { key:'clothco2',   label:'clothing CO₂ (kg)' },
    { key:'packages',   label:'e-commerce CO₂ (kg)' },
  ];

  const KEY_MAXES = {};
  BREAKDOWN_KEYS.forEach(({ key }) => {
    KEY_MAXES[key] = Math.max(...RAW.map(d => d[key]));
  });

  function metricVal(d, m) {
    if (m === 'total') return d.flights + d.meatkg + d.avgt + d.clothco2 + d.packages;
    return d[m];
  }

  let metricMode = 'total';
  let sim;

  const svg = d3.select('#svg');
  let W, H;

  function dims() {
    const el = document.getElementById('sketch-container');
    W = el.clientWidth  || 600;
    H = el.clientHeight || 600;
    svg.attr('viewBox', `0 0 ${W} ${H}`);
  }

  /* ── COLOURS ──────────────────────────────────────────────────────────── */
  const bubbleFill   = 'rgb(148, 225, 187)';
  const bubbleStroke = 'rgb(52, 151, 103)';
  const usaFill      = 'rgb(52, 151, 103)';
  const usaStroke    = 'rgb(30, 100, 65)';
  const youFill      = '#22c55e';
  const youStroke    = '#16a34a';
  const labelDark    = '#003012';
  const labelLight   = '#fff';

  /* ── BUILD CHART ─────────────────────────────────────────────────────── */
  function buildChart() {
    dims();
    svg.selectAll('*').remove();

    const maxVal = Math.max(...RAW.map(d => metricVal(d, metricMode)));
    const maxR   = Math.min(W, H) * 0.14;
    const rScale = d3.scalePow().exponent(0.35).domain([0, maxVal]).range([3, maxR]);

    const nodes = RAW.map(d => ({
      ...d,
      val: metricVal(d, metricMode),
      r:   rScale(metricVal(d, metricMode)),
      x:   W / 2 + (Math.random() - 0.5) * W * 0.3,
      y:   H / 2 + (Math.random() - 0.5) * H * 0.3,
    }));

    const g = svg.append('g');

    const nodeG = g.selectAll('g.node')
      .data(nodes)
      .join('g')
      .attr('class', 'node')
      .style('cursor', 'pointer');

    nodeG.append('circle')
      .attr('r',            d => d.r)
      .attr('fill',         d => d.isUser ? youFill   : d.name === 'USA' ? usaFill   : bubbleFill)
      .attr('stroke',       d => d.isUser ? youStroke : d.name === 'USA' ? usaStroke : bubbleStroke)
      .attr('stroke-width', d => (d.isUser || d.name === 'USA') ? 2.5 : 1.5)
      .attr('opacity', 0);

    nodeG.append('text')
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'middle')
      .style('pointer-events', 'none')
      .style('font-family', 'pangea, system-ui, sans-serif')
      .attr('fill',        d => (d.isUser || d.name === 'USA') ? labelLight : labelDark)
      .attr('font-size',   d => Math.max(9, Math.min(13, d.r * 0.38)))
      .attr('font-weight', d => (d.isUser || d.name === 'USA') ? '500' : '400')
      .text(d => d.r > 14 ? (d.isUser ? 'You ★' : d.name) : '');

    nodeG
      .on('mouseover', function(event, d) {
        d3.select(this).select('circle').attr('stroke-width', 3.5);
        renderSidebar(d);
      })
      .on('mouseout', function(event, d) {
        d3.select(this).select('circle')
          .attr('stroke-width', (d.isUser || d.name === 'USA') ? 2.5 : 1.5);
        const user = nodes.find(n => n.isUser);
        if (user) renderSidebar(user); else clearSidebar();
      });

    if (sim) sim.stop();
    sim = d3.forceSimulation(nodes)
      .force('charge',  d3.forceManyBody().strength(5))
      .force('center',  d3.forceCenter(W / 2, H / 2).strength(0.08))
      .force('collide', d3.forceCollide(d => d.r + 3).strength(0.9).iterations(3))
      .force('x',       d3.forceX(W / 2).strength(0.04))
      .force('y',       d3.forceY(H / 2).strength(0.04))
      .on('tick', () => {
        nodeG.attr('transform', d =>
          `translate(${Math.max(d.r, Math.min(W - d.r, d.x))},${Math.max(d.r, Math.min(H - d.r, d.y))})`
        );
      });

    nodeG.select('circle')
      .transition().duration(600).delay((d, i) => i * 40)
      .attr('opacity', 1);

    const userNode = nodes.find(n => n.isUser);
    if (userNode) setTimeout(() => renderSidebar(userNode), 800);
  }

  /* ── SIDEBAR ──────────────────────────────────────────────────────────── */
  function renderSidebar(d) {
    const panel = document.getElementById('info-panel');
    panel.classList.remove('empty');

    const usaVal = metricVal(RAW.find(r => r.name === 'USA'), metricMode);
    const pct    = Math.round((d.val / usaVal) * 100);

    document.getElementById('countryName').textContent =
      d.isUser ? 'You ★' : d.name === 'USA' ? 'USA ★' : d.name;
    document.getElementById('countryMeta').textContent =
      `${pct}% of USA  ·  ${Math.round(d.val).toLocaleString()} total`;

    document.getElementById('countryBreakdown').innerHTML = BREAKDOWN_KEYS.map(({ key, label }) => {
      const v      = d[key] || 0;
      const barPct = Math.min(100, (v / KEY_MAXES[key]) * 100).toFixed(1);
      const disp   = Number.isInteger(v) ? v : v.toFixed(1);
      return `<div class="breakdown-row">
        <div class="breakdown-label">${label}</div>
        <div class="breakdown-bar-wrap">
          <div class="breakdown-bar-bg">
            <div class="breakdown-bar-fill" style="width:${barPct}%"></div>
          </div>
          <div class="breakdown-val">${disp}</div>
        </div>
      </div>`;
    }).join('');
  }

  function clearSidebar() {
    document.getElementById('info-panel').classList.add('empty');
  }

  /* ── INIT ─────────────────────────────────────────────────────────────── */
  buildChart();

  document.getElementById('replayBtn').onclick  = buildChart;
  document.getElementById('metricSel').onchange = function() { metricMode = this.value; buildChart(); };
  window.addEventListener('resize', () => { if (sim) sim.stop(); buildChart(); });
</script>
</body>
</html>
